name: Slack Approval Handler
run-name: Slack Approval — ${{ inputs.company }} (${{ inputs.event_id }})

# Dispatched by the per-company Cloudflare Worker. The Worker passes its
# COMPANY var so events from each Slack app land in the right environment.

on:
  workflow_dispatch:
    inputs:
      event_b64:
        description: Base64-encoded Slack event JSON
        required: true
      event_id:
        description: Slack event_id for deduplication
        required: false
        default: manual
      company:
        description: Which company this Slack event belongs to
        type: choice
        options:
          - peachtree
          - tc
        default: peachtree

concurrency:
  group: slack-approve-${{ inputs.company }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ inputs.company }}
    env:
      COMPANY: ${{ inputs.company }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-slack-approve.txt

      - name: Classify Slack event
        id: classify
        env:
          SLACK_EVENT_B64: ${{ inputs.event_b64 }}
          PYTHONPATH: src
        run: |
          set -euo pipefail
          python scripts/classify_slack_event.py \
            --event-b64 "${SLACK_EVENT_B64}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Pull latest generated drafts
        if: steps.classify.outputs.skip_event != 'true'
        run: git pull --rebase origin "${GITHUB_REF_NAME:-main}"

      - name: Install system packages for PDF generation
        if: steps.classify.outputs.skip_event != 'true' && steps.classify.outputs.needs_pdf_deps == 'true'
        run: bash scripts/ci-apt-packages.sh

      - name: Install dependencies with PDF support
        if: steps.classify.outputs.skip_event != 'true' && steps.classify.outputs.needs_pdf_deps == 'true'
        run: python -m pip install -r requirements.txt

      - name: Install lightweight approval dependencies
        if: steps.classify.outputs.skip_event != 'true' && steps.classify.outputs.needs_pdf_deps != 'true'
        run: python -m pip install -r requirements-slack-approve.txt

      - name: Process Slack event
        if: steps.classify.outputs.skip_event != 'true'
        id: slack
        env:
          PYTHONPATH: src
          SLACK_EVENT_B64: ${{ inputs.event_b64 }}
          SLACK_APPROVAL_BOT_TOKEN: ${{ secrets.SLACK_APPROVAL_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL: ${{ secrets.SLACK_APPROVAL_CHANNEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_WRITING_MODEL: ${{ secrets.TOGETHER_WRITING_MODEL }}
          CLAUDE_WRITING_MODEL: ${{ vars.CLAUDE_WRITING_MODEL }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_CREDENTIALS: ${{ secrets.AUTHOR_CREDENTIALS }}
          PSAI_API_KEY: ${{ secrets.PSAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python scripts/process_slack_event.py \
            --event-b64 "${SLACK_EVENT_B64}" \
            --result-json slack_result.json
          changed="$(python -c "import json; print(json.load(open('slack_result.json'))['changed'])")"
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Commit approval state
        if: steps.classify.outputs.skip_event != 'true' && steps.slack.outputs.changed == 'True'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          if [ -f "output/${COMPANY}/sources/used_sources.json" ]; then
            git add -f "output/${COMPANY}/sources/used_sources.json"
          fi
          git diff --cached --quiet && exit 0
          git commit -m "Sync Slack approval (${{ inputs.company }}) from event ${{ inputs.event_id }}"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push
