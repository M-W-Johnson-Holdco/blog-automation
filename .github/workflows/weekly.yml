name: Weekly Blog Pipeline
run-name: Weekly Blog Pipeline — ${{ github.event_name == 'workflow_dispatch' && inputs.company || 'both' }}

# Multi-tenant: one repo drives both companies. Per-company secrets live in
# GitHub Environments named "peachtree" and "tc" (same secret names in each);
# shared secrets (ANTHROPIC_API_KEY, TOGETHER_API_KEY, TAVILY key if shared)
# can live at repo level — environment lookup falls back to repo secrets.

on:
  workflow_dispatch:
    inputs:
      company:
        description: Which company to run
        type: choice
        options:
          - both
          - peachtree
          - tc
        default: both
      send_to_slack:
        description: Post the new draft to Slack after writing
        type: boolean
        default: true
      widen_search:
        description: Run all search queries (helps on quiet news weeks)
        type: boolean
        default: true
      include_used_sources:
        description: Allow previously used story URLs in search
        type: boolean
        default: false
      scheduled_day:
        description: Cloudflare schedule day (monday/wednesday); leave manual for UI runs
        type: choice
        options:
          - manual
          - monday
          - wednesday
        default: manual

permissions:
  contents: write

jobs:
  draft:
    name: ${{ matrix.company }}
    strategy:
      fail-fast: false
      matrix:
        company: [peachtree, tc]
    # Skip legs that don't match the requested company
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ matrix.company }}
    concurrency:
      group: weekly-blog-pipeline-${{ matrix.company }}
      cancel-in-progress: false
    env:
      COMPANY: ${{ matrix.company }}
    steps:
      - name: Check company selection
        id: selected
        run: |
          if [ "${{ inputs.company }}" = "both" ] || [ "${{ inputs.company }}" = "${{ matrix.company }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.selected.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.selected.outputs.run == 'true'
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system packages for PDF generation
        if: steps.selected.outputs.run == 'true'
        run: bash scripts/ci-apt-packages.sh

      - name: Install dependencies
        if: steps.selected.outputs.run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Pull latest generated state
        if: steps.selected.outputs.run == 'true'
        run: git pull --rebase origin "${GITHUB_REF_NAME:-main}" || git pull --rebase

      - name: Plan weekly run
        if: steps.selected.outputs.run == 'true'
        id: plan
        env:
          PYTHONPATH: src
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          WIDEN_SEARCH_INPUT: ${{ inputs.widen_search }}
          SCHEDULED_DAY_INPUT: ${{ inputs.scheduled_day }}
        run: python scripts/weekly_pipeline_plan.py

      - name: Skip pipeline (draft already posted this week)
        if: steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline != 'true'
        run: |
          echo "Skipping pipeline — ${{ steps.plan.outputs.skip_reason || 'plan said do not run' }}"

      - name: Run search → evaluate → write
        if: steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true'
        env:
          PYTHONPATH: src
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'anthropic' }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          TOGETHER_WRITING_MODEL: ${{ secrets.TOGETHER_WRITING_MODEL }}
          CLAUDE_WRITING_MODEL: ${{ vars.CLAUDE_WRITING_MODEL }}
          AUTHOR_NAME: ${{ secrets.AUTHOR_NAME }}
          AUTHOR_CREDENTIALS: ${{ secrets.AUTHOR_CREDENTIALS }}
        run: |
          set -euo pipefail
          EXTRA=(--with-search --clear-drafts)
          if [ "${{ steps.plan.outputs.widen_search }}" = "true" ]; then
            EXTRA+=(--all-queries)
          fi
          if [ "${{ inputs.include_used_sources == true }}" = "true" ]; then
            EXTRA+=(--include-used-sources)
          fi
          python write_tournament.py "${EXTRA[@]}"

      - name: Post draft to Slack
        if: steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true' && inputs.send_to_slack == true
        env:
          PYTHONPATH: src
          SLACK_APPROVAL_BOT_TOKEN: ${{ secrets.SLACK_APPROVAL_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL: ${{ secrets.SLACK_APPROVAL_CHANNEL }}
          PSAI_API_KEY: ${{ secrets.PSAI_API_KEY }}
        run: python pipeline.py --stage approve_post --no-archive

      - name: Archive draft for Slack webhook
        if: steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true' && inputs.send_to_slack == true
        env:
          PYTHONPATH: src
        run: python scripts/archive_ci_draft.py --run-id "${{ github.run_id }}"

      - name: Record weekly success and commit archive
        if: steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true' && inputs.send_to_slack == true
        env:
          PYTHONPATH: src
        run: |
          python scripts/weekly_pipeline_record.py \
            --status success \
            --day "${{ steps.plan.outputs.scheduled_day }}" \
            --run-id "${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --cached --quiet && exit 0
          git commit -m "Archive CI draft run ${{ github.run_id }} (${{ matrix.company }}) for Slack webhook"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}"
          git push

      - name: Upload draft artifacts
        if: success() && steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: blog-draft-${{ matrix.company }}-${{ github.run_id }}
          path: |
            output/${{ matrix.company }}/drafts/drafts_md/*.md
            output/${{ matrix.company }}/drafts/drafts_pdf/*.pdf
            output/${{ matrix.company }}/drafts/drafts_json/*-validation.json
            output/${{ matrix.company }}/drafts/pipeline_run.log
            output/${{ matrix.company }}/multi_run/*/run.log
            output/${{ matrix.company }}/multi_run/*/tournament_summary.md
            output/${{ matrix.company }}/sources/kept_sources.json
            output/${{ matrix.company }}/sources/evaluated_sources.json
          if-no-files-found: warn
          retention-days: 30

      - name: Record failure and notify if final
        if: failure() && steps.selected.outputs.run == 'true' && steps.plan.outputs.run_pipeline == 'true' && (inputs.scheduled_day == 'monday' || inputs.scheduled_day == 'wednesday')
        env:
          PYTHONPATH: src
          SLACK_APPROVAL_BOT_TOKEN: ${{ secrets.SLACK_APPROVAL_BOT_TOKEN }}
          SLACK_APPROVAL_CHANNEL: ${{ secrets.SLACK_APPROVAL_CHANNEL }}
        run: |
          python scripts/weekly_pipeline_record.py \
            --status failed \
            --day "${{ steps.plan.outputs.scheduled_day }}" \
            --run-id "${{ github.run_id }}"
          python scripts/notify_slack_no_draft.py --day "${{ steps.plan.outputs.scheduled_day }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true
          git add generated/
          git diff --cached --quiet && exit 0
          git commit -m "Record weekly pipeline failure (${{ matrix.company }}, ${{ steps.plan.outputs.scheduled_day }}) run ${{ github.run_id }}"
          git push
